<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secondary School Registration Form</title>
  <link rel="StyleSheet" href="home.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .form-container {
      max-width: 600px;
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: auto;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row div {
      flex: 1;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      background: #007bff;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
       <ul class="navbar">
  <li><a href="/">HOME</a></li>
  <li><a href="#">ABOUT US</a></li>
  <li><a href="/form.html">APPLICATION FORM</a></li>

 
  
</ul>

<div class="form-container">
  <h2>Student Registration Form</h2>

  <form action="#" method="POST">
    
    <label>Full Name</label>
    <div class="row">
      <div><input type="text" name="firstName" placeholder="First Name" required></div>
      <div><input type="text" name="lastName" placeholder="Last Name" required></div>
    </div>

    <label>Date of Birth</label>
    <input type="date" name="dob" required>

    <label>Gender</label>
    <select name="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <label>Class Applying For</label>
    <select name="class" required>
      <option value="">Select Class</option>
      <option>S1</option>
      <option>S2</option>
      <option>S3</option>
      <option>S4</option>
      <option>S5</option>
      <option>S6</option>
    </select>

    <label>Previous School</label>
    <input type="text" name="previousSchool">

    <label>Parent/Guardian Name</label>
    <input type="text" name="guardianName" required>

    <label>Parent/Guardian Contact</label>
    <input type="tel" name="guardianContact" placeholder="e.g. 07XXXXXXXX" required>

    <label>Email Address</label>
    <input type="email" name="email">

    <label>Home Address</label>
    <textarea name="address" rows="3"></textarea>

    <label>Upload Student Photo</label>
    <input type="file" name="photo" accept="image/*">

    <button type="submit">Register</button>

  </form>
</div>

</body>
</html>
